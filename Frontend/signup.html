<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
    }

    .container {
      width: 300px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
    }

    button {
      padding: 8px 15px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📝 Student Signup</h2>

  <form id="signupForm">
    <input type="text" id="name" placeholder="Name" required><br>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Password" required><br>

    <button type="submit">Signup</button>
  </form>

  <!-- Message -->
  <p class="msg" id="message"></p>

  <!-- Redirect link -->
  <a href="login.html">Already have an account? Login</a>
</div>

<!-- ✅ Link your main script -->
<script src="script.js"></script>

</body>
</html>

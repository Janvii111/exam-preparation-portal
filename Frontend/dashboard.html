<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
    }

    header {
      background: #007bff;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .filters {
      text-align: center;
      margin: 20px;
    }

    select, button {
      padding: 8px;
      margin: 5px;
    }

    #papers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }

    .card a {
      display: inline-block;
      margin: 5px;
      padding: 5px 10px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>📊 Student Dashboard</h1>
</header>

<!-- Filters -->
<div class="filters">

  <select id="year">
    <option value="">Select Year</option>
    <option value="2nd">2nd </option>
    <option value="3rd">3rd </option>
    <option value="4th">4th </option>
  </select>

  <select id="semester">
    <option value="">Select Semester</option>
    <option value="3rd">3rd</option>
    <option value="4th">4th</option>
    <option value="5th">5th</option>
    <option value="6th">6th</option>
    <option value="7th">7th</option>
    <option value="8th">8th</option>
  </select>

  <select id="examType">
    <option value="">Exam Type</option>
    <option value="CT1">CT1</option>
    <option value="CT2">CT2</option>
    <option value="EndSem">EndSem</option>
  </select>

  <button onclick="loadPapers()">Search</button>

</div>

<!-- Papers -->
<div id="papers"></div>

<!-- Separate JS -->
<script src="script.js"></script>

</body>
</html>
